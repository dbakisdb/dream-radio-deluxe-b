<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Radio | Ρέθυμνο</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@600;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --accent: #fbbf24;
            --dark: #020617;
            --light: #f9fafb;
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(148, 163, 184, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #020617; color: var(--light); overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        header { 
            padding: 20px 0; 
            background: rgba(2, 6, 23, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-icon { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--primary); }
        
        /* --- HYPER-DRIVE PLAYER SECTION --- */
        .player-wrap { padding: 40px 0; }
        .hyper-bar {
            width: 100%;
            min-height: 120px;
            background: #000;
            border: 2px solid var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.3);
        }

        .play-core {
            width: 140px; height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; z-index: 10;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
        }
        .play-core:hover { filter: brightness(1.2); }
        .play-core i { font-size: 36px; color: #000; margin-bottom: 5px; }
        .play-core span { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 900; color: #000; }

        .info-area { padding-left: 30px; flex: 1; }
        .info-area p { font-size: 10px; color: var(--primary); letter-spacing: 2px; font-weight: bold; margin-bottom: 2px; }
        .info-area h2 { font-family: 'Orbitron', sans-serif; font-size: 24px; letter-spacing: 3px; }

        .viz-box { 
            flex: 1; height: 80px; display: flex; align-items: flex-end; gap: 3px; padding: 0 20px;
        }
        .v-bar { width: 4px; background: var(--primary); border-radius: 2px; transition: height 0.1s; }

        .tech-info { padding-right: 30px; text-align: right; font-family: monospace; font-size: 11px; color: var(--primary); opacity: 0.8; }

        /* Chat Section */
        .chat-container { margin: 40px 0; background: var(--glass); border-radius: 24px; border: 1px solid var(--glass-border); overflow: hidden; }
        .chat-header { padding: 15px 20px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--glass-border); }
        
        /* Iframe Fallback for Chat */
        .chat-box { width: 100%; height: 500px; border: none; background: #0d1b2a; }

        /* Forms */
        .request-card { max-width: 600px; margin: 40px auto; padding: 30px; background: var(--glass); border-radius: 24px; border: 1px solid var(--glass-border); }
        .form-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--secondary); transform: translateY(-2px); }

        /* Mobile */
        @media (max-width: 768px) {
            .play-core { width: 100px; }
            .info-area h2 { font-size: 16px; }
            .viz-box, .tech-info { display: none; }
            .hyper-bar { min-height: 100px; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="header-flex">
            <a href="#" class="logo">
                <div class="logo-icon"><i class="fas fa-broadcast-tower"></i></div>
                <div class="logo-text"><strong>Dream Radio</strong><br><small>ΡΕΘΥΜΝΟ</small></div>
            </a>
            <nav style="display: flex; gap: 20px; font-size: 14px;">
                <a href="#chat" style="color: white; text-decoration: none;">CHAT</a>
                <a href="#request" style="color: white; text-decoration: none;">ΑΙΤΗΣΗ</a>
            </nav>
        </div>
    </div>
</header>

<section class="player-wrap">
    <div class="container">
        <div class="hyper-bar">
            <!-- Play Trigger -->
            <div class="play-core" id="play-btn">
                <i class="fas fa-play" id="btn-icon"></i>
                <span id="btn-text">START</span>
            </div>

            <!-- Station Info -->
            <div class="info-area">
                <p>LIVE STREAMING</p>
                <h2>DREAM RADIO</h2>
            </div>

            <!-- Visualizer -->
            <div class="viz-box" id="viz">
                <!-- Bars via JS -->
            </div>

            <!-- Tech Readout -->
            <div class="tech-info">
                <div>FREQ: 81.03 MHZ</div>
                <div>SIGNAL: <span id="sig-val">IDLE</span></div>
            </div>
        </div>
        <audio id="audio-engine" src="https://alpha.streamhub.gr/stream/dream-radio_8103"></audio>
    </div>
</section>

<section class="container" id="chat">
    <div class="chat-container">
        <div class="chat-header">
            <i class="fas fa-comments"></i> Live Chat Κοινότητας
        </div>
        <!-- Το Chat του πελάτη σου -->
        <div class="chat-box">
             <iframe src="https://minnit.chat/DreamRadio?embed&&nickname=" style="border:none;width:100%;height:100%;" allowTransparency="true"></iframe>
        </div>
    </div>
</section>

<section class="container" id="request">
    <div class="request-card">
        <h3 style="margin-bottom: 20px; text-align: center; font-family: 'Orbitron';">ΑΙΤΗΣΗ ΤΡΑΓΟΥΔΙΟΥ</h3>
        <form action="https://formspree.io/f/mdakqreq" method="POST">
            <input type="text" name="name" placeholder="Το όνομά σου" class="form-input" required>
            <input type="text" name="song" placeholder="Τίτλος Τραγουδιού" class="form-input" required>
            <textarea name="message" placeholder="Αφιέρωση / Μήνυμα" class="form-input" style="height: 100px;"></textarea>
            <button type="submit" class="submit-btn">ΑΠΟΣΤΟΛΗ ΤΩΡΑ</button>
        </form>
    </div>
</section>

<footer style="text-align: center; padding: 40px; opacity: 0.5; font-size: 12px;">
    &copy; 2026 DREAM RADIO RETHYMNO | POWERED BY HYPER-DRIVE
</footer>

<script>
    const audio = document.getElementById('audio-engine');
    const playBtn = document.getElementById('play-btn');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');
    const sigVal = document.getElementById('sig-val');
    const viz = document.getElementById('viz');
    
    let isPlaying = false;

    // Create Bars
    for(let i=0; i<40; i++) {
        const b = document.createElement('div');
        b.className = 'v-bar';
        b.style.height = '10%';
        viz.appendChild(b);
    }

    const bars = document.querySelectorAll('.v-bar');

    function animate() {
        bars.forEach(b => {
            const h = isPlaying ? Math.random() * 80 + 10 : Math.random() * 10 + 5;
            b.style.height = h + '%';
        });
        setTimeout(animate, isPlaying ? 100 : 500);
    }
    animate();

    playBtn.onclick = () => {
        if(!isPlaying) {
            audio.play();
            btnIcon.className = 'fas fa-pause';
            btnText.innerText = 'STOP';
            sigVal.innerText = 'ACTIVE';
            sigVal.style.color = '#00ff00';
            isPlaying = true;
        } else {
            audio.pause();
            btnIcon.className = 'fas fa-play';
            btnText.innerText = 'START';
            sigVal.innerText = 'IDLE';
            sigVal.style.color = 'var(--primary)';
            isPlaying = false;
        }
    };
</script>

</body>
</html>
